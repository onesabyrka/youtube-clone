<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./assets/favicon/favicon.svg" type="image/svg+xml" />
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__start">
        <button class="header__burger-button" type="button" title="Open menu">
          <img
            class="header__burger-image"
            src="./assets/icons/burger-button.svg"
            alt="Open menu"
            width="24"
            height="24"
          />
        </button>
        <a class="header__logo" href="/" title="YouTube Home">
          <img
            class="header__logo-image"
            src="./assets/images/logo.svg"
            alt="YouTube"
            width="93"
            height="20"
            loading="lazy"
          />
        </a>
      </div>

      <div class="header__center">
        <form class="header__form" action="/search">
          <div class="header__form-body">
            <label class="visually-hidden" for="search">Search</label>
            <input class="header__form-input" id="search" type="search" placeholder="Search" />
            <button class="header__form-button" type="submit" title="Search">
              <img
                class="header__form-search-image"
                src="./assets/icons/search.svg"
                alt="Search"
                width="24"
                height="24"
              />
            </button>
          </div>
        </form>

        <button class="header__voice-button" type="button" title="Search with your voice">
          <img
            class="header__voice-image"
            src="./assets/icons/voice.svg"
            alt="Search with your voice"
            width="24"
            height="24"
          />
        </button>
      </div>

      <div class="header__actions">
        <button class="header__create-button" type="button" title="Create">
          <img
            class="header__create-image"
            src="./assets/icons/plus.svg"
            alt="Create"
            width="24"
            height="24"
          />
          <span>Create</span>
        </button>

        <button class="header__notifications-button" type="button" title="Notifications">
          <img
            class="header__notifications-image"
            src="./assets/icons/notifications.svg"
            alt="Notifications"
            width="24"
            height="24"
          />
        </button>

        <button
          class="header__profile-button"
          type="button"
          title="Appearance and settings"
          aria-haspopup="true"
        >
          <img
            class="header__profile-image"
            src="./assets/images/avatar.jpg"
            alt="User avatar"
            width="24"
            height="24"
          />
        </button>
      </div>
    </header>
    <div class="feed-filter">
      <ul class="feed-filter__list">
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">All</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Music</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Dark Ambient</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Playlists</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Gaming</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">HTML</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">AI</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Computers</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Comedy</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Recently uploaded</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">Watched</button>
        </li>
        <li class="feed-filter__item">
          <button class="feed-filter__button" type="button">New to you</button>
        </li>
      </ul>
    </div>
  </body>
</html>
